name: PR Check

on:
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build-debug:
    name: Build (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Assemble debug APK
        run: ./gradlew assembleDebug detekt ktlintCheck --no-daemon
