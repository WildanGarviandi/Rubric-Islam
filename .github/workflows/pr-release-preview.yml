name: PR Release Preview

on:
  pull_request:
    types: [labeled]
    branches: ["master"]

permissions:
  contents: write
  checks: read
  pull-requests: write

jobs:
  build-release-preview:
    name: Build (release, signed) — PR preview
    runs-on: ubuntu-latest
    # Only run when the label that triggered this event was exactly "merge"
    if: github.event.label.name == 'merge'
    steps:
      - name: Block forked-repo PRs from this workflow
        # Secrets are unavailable to fork PRs under the `pull_request` event
        # anyway, but we fail loudly and early instead of letting later steps
        # fail confusingly on an empty keystore.
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::This workflow only runs for PRs from the same repository (not forks), since release signing secrets are not available to fork PRs."
          exit 1

      - name: Wait for PR Check workflow to complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          REQUIRED_CHECKS=("Build (debug)")
          MAX_WAIT_SECONDS=600
          INTERVAL=10
          ELAPSED=0

          while true; do
            RESPONSE=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" --paginate)
            ALL_DONE=true
            ANY_FAILED=false

            for CHECK_NAME in "${REQUIRED_CHECKS[@]}"; do
              STATUS=$(echo "$RESPONSE" | jq -r --arg name "$CHECK_NAME" '.check_runs[] | select(.name == $name) | .status' | head -n1)
              CONCLUSION=$(echo "$RESPONSE" | jq -r --arg name "$CHECK_NAME" '.check_runs[] | select(.name == $name) | .conclusion' | head -n1)

              if [ -z "$STATUS" ]; then
                echo "Check '$CHECK_NAME' not found yet..."
                ALL_DONE=false
                continue
              fi

              if [ "$STATUS" != "completed" ]; then
                echo "Check '$CHECK_NAME' still running (status: $STATUS)..."
                ALL_DONE=false
              elif [ "$CONCLUSION" != "success" ]; then
                echo "::error::Check '$CHECK_NAME' completed with conclusion: $CONCLUSION"
                ANY_FAILED=true
              else
                echo "Check '$CHECK_NAME' passed."
              fi
            done

            if [ "$ANY_FAILED" = true ]; then
              echo "::error::One or more required checks did not succeed. Aborting release build."
              exit 1
            fi

            if [ "$ALL_DONE" = true ]; then
              echo "All required checks passed."
              break
            fi

            ELAPSED=$((ELAPSED + INTERVAL))
            if [ "$ELAPSED" -ge "$MAX_WAIT_SECONDS" ]; then
              echo "::error::Timed out after ${MAX_WAIT_SECONDS}s waiting for checks to complete."
              exit 1
            fi

            sleep "$INTERVAL"
          done

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release-key.jks

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=../release-key.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Verify keystore files exist
        run: |
          test -s release-key.jks || { echo "::error::release-key.jks is missing or empty — check KEYSTORE_BASE64 secret"; exit 1; }
          test -s keystore.properties || { echo "::error::keystore.properties is missing or empty"; exit 1; }

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Clean up keystore secrets from disk
        if: always()
        run: rm -f release-key.jks keystore.properties

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-pr${{ github.event.pull_request.number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

  merge-pr:
    name: Squash and merge PR
    runs-on: ubuntu-latest
    needs: build-release-preview
    # needs: alone already means this job is skipped if build-release-preview
    # fails — but we also re-state it explicitly via the if: condition below
    # so the gate is obvious just from reading this job, without having to
    # trace GitHub's default needs-failure behavior.
    if: needs.build-release-preview.result == 'success'
    steps:
      - name: Squash and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --match-head-commit "${{ github.event.pull_request.head.sha }}"
